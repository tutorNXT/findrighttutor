        /* 3D Perspective & Flip Styles */

        .backface-hidden {

                    try {
                        const response = await fetch('index.html');
                        if (!response.ok) throw new Error('Fetch rejected');
                        
                        const htmlText = await response.text();
                        
                        // Extremely robust bracket-matching extractor for teachersData
                        const searchStr = 'const teachersData =';
                        const startIdx = htmlText.indexOf(searchStr);
                        if (startIdx !== -1) {
                            const arrayStart = htmlText.indexOf('[', startIdx + searchStr.length);
                            if (arrayStart !== -1) {
                                let bracketCount = 0;
                                let endIdx = -1;
                                for (let i = arrayStart; i < htmlText.length; i++) {
                                    if (htmlText[i] === '[') bracketCount++;
                                    else if (htmlText[i] === ']') {
                                        bracketCount--;
                                        if (bracketCount === 0) {
                                            endIdx = i;
                                            break;
                                        }
                                    }
                                }
                                if (endIdx !== -1) {
                                    const arrayString = htmlText.slice(arrayStart, endIdx + 1);
                                    const parsedTeachers = new Function(`return ${arrayString}`)();
                                    if (parsedTeachers && parsedTeachers.length > 0) {
                                        setTeachersDatabase(parsedTeachers);
                                        console.log("TutorNxt Scraper: Successfully synced with index.html");
                                    }
                                }
                            }
                        }
                    } catch (err) {
                        console.warn("TutorNxt Scraper: Dynamic fetch blocked by CORS or file layout. Executing fallback database.", err);
                    }
                }
                scrapeIndexTeachers();
            }, []);

                                resolveTeacherAndAvatar(currentCloudProfile);
                            }
                        }

                        resolveLocalProfile();

                    setSelectedDateRating(parseInt(savedRating));
                    setHasRated(true);
                } else {
                    setSelectedDateRating(0);
                    setHasRated(false);
                }

                    setSubmittedComplaints(JSON.parse(savedComplaints));

                    setSubmittedComplaints([]);

                                                            >
                                                                <i className={`${isGold ? 'fa-solid' : 'fa-regular'} fa-star`}></i>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                <div className="text-xs font-bold text-slate-500">
                                                    {selectedRating > 0 ? `${selectedRating} Star${selectedRating > 1 ? 's' : ''} Selected` : "Click to rate"}
                                                </div>
                                            </div>

                                            {!hasRated && (
                                                <button 
                                                    type="button" 
                                                    onClick={submitTeacherRating}
                                                    className="w-full sm:w-auto px-6 py-2.5 bg-brandBlue hover:bg-brandBlue-dark text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-md active:scale-95"
                                                >
                                                    Submit Rating Evaluation
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white border border-slate-100 rounded-[2rem] shadow-xl p-6 text-center text-slate-400 font-bold">
                                        <i className="fa-solid fa-circle-exclamation text-2xl mb-2 text-slate-300 block"></i>
                                        Unable to automatically retrieve assigned mentor details.
                                    </div>
                                )}

                                {/* Support & Complaint Registration Form */}
                                <div className="bg-white border border-slate-100 rounded-[2rem] shadow-xl p-6 md:p-8 space-y-5">
                                    <div className="space-y-1">
                                        <h4 className="text-xs uppercase font-black tracking-widest text-slate-400 block">TutorNxt Student Desk</h4>
                                        <h3 className="text-xl font-extrabold text-slate-900">File Support Ticket or Complaint</h3>
                                        <p className="text-slate-500 text-xs">Let us know if you are experiencing schedule delays, teacher absences, or any other.</p>
                                    </div>

                                    <form onSubmit={handleComplaintSubmit} className="space-y-4">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Ticket Category</label>
                                                <select 
                                                    value={complaintCategory} 
                                                    onChange={(e) => setComplaintCategory(e.target.value)}
                                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all text-slate-700"
                                                >
                                                    <option value="Academics">Academics & Mentoring</option>
                                                    <option value="Scheduling">Schedule / Availability Conflict</option>
                                                    <option value="Fees Ledger">Fee Issues</option>
                                                    <option value="App Issues">Student Portal Bug</option>
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Student Affiliation</label>
                                                <input 
                                                    type="text" 
                                                    disabled 
                                                    value={student.schoolOrCollege} 
                                                    className="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold text-slate-500 outline-none"
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Detailed Complaint Description</label>
                                            <textarea 
                                                rows="3" 
                                                required
                                                value={complaintMsg}
                                                onChange={(e) => setComplaintMsg(e.target.value)}
                                                placeholder="Provide specific details, dates, or issues. Our support team will review this ticket and resolve it within 24 hours." 
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-medium focus:outline-none focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue transition-all text-slate-800 placeholder:text-slate-400"
                                            ></textarea>
                                        </div>

                                        <button 
                                            type="submit" 
                                            className="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg"
                                        >
                                            File Complaint Ticket
                                        </button>
                                    </form>

                                    {/* List of submitted tickets */}
                                    {submittedComplaints.length > 0 && (
                                        <div className="space-y-3 pt-3">
                                            <h5 className="text-[10px] uppercase font-bold text-slate-400 tracking-wider border-t border-slate-100 pt-5">Submitted Ticket History</h5>
                                            <div className="space-y-2.5 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                                                {submittedComplaints.map((ticket, index) => (
                                                    <div key={index} className="p-3 bg-slate-50 rounded-xl border border-slate-100 space-y-1.5">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-[10px] font-mono font-bold text-brandBlue">{ticket.id}</span>
                                                            <span className="text-[9px] font-black uppercase tracking-widest text-amber-500 bg-amber-50 border border-amber-200/50 px-2 py-0.5 rounded">
                                                                {ticket.status}
                                                            </span>
                                                        </div>
                                                        <p className="text-[11px] font-semibold text-slate-400">{ticket.category} — {ticket.date}</p>
                                                        <p className="text-xs text-slate-600 font-medium leading-relaxed italic">"{ticket.message}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>

                        </div>
                    </main>

                   
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<TutorNxtApp />);
    </script>
</body>
</html>
